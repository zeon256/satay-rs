<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="glowT" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9d6f52" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9d6f52" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowE" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e88844" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#e88844" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skewer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e88844" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="#e88844" stop-opacity="0"/>
      <stop offset="62%" stop-color="#9d6f52" stop-opacity="0.08"/>
      <stop offset="82%" stop-color="#9d6f52" stop-opacity="0"/>
    </linearGradient>
    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <pattern id="borderAccent" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none"/>
      <path d="M0 8 L8 0" stroke="#9d6f52" stroke-opacity="0.15" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#2d2a27"/>
  <ellipse cx="980" cy="120" rx="280" ry="220" fill="url(#glowT)"/>
  <ellipse cx="180" cy="520" rx="240" ry="200" fill="url(#glowE)"/>
  <rect width="1200" height="630" fill="url(#skewer)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="1"/>

  <rect x="0" y="0" width="6" height="630" fill="#e88844" fill-opacity="0.7"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#borderAccent)" opacity="0.4"/>

  <text x="72" y="88" font-family="'DejaVu Sans Mono', 'Liberation Mono', monospace" font-size="15" font-weight="500" letter-spacing="3.2" fill="#c9bea8" fill-opacity="0.85">
    <tspan fill="#9d6f52">SANS-IO</tspan>
    <tspan dx="14" fill="#c9bea8" fill-opacity="0.35">·</tspan>
    <tspan dx="14">OPENAPI 3.1</tspan>
    <tspan dx="14" fill="#c9bea8" fill-opacity="0.35">·</tspan>
    <tspan dx="14">RUST 2024</tspan>
  </text>

  <text x="72" y="168" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="600" letter-spacing="-0.5" fill="#ede8d8">Satay</text>

  <text x="72" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="600" letter-spacing="-1.5" fill="#ede8d8">OpenAPI clients</text>
  <text x="72" y="318" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="600" letter-spacing="-1.5" fill="#9d6f52">without picking a transport</text>

  <text x="72" y="388" font-family="'DejaVu Sans', 'Liberation Sans', sans-serif" font-size="24" fill="#c9bea8" fill-opacity="0.9">Request builders, response decoders,</text>
  <text x="72" y="422" font-family="'DejaVu Sans', 'Liberation Sans', sans-serif" font-size="24" fill="#c9bea8" fill-opacity="0.9">and validation newtypes — you pick the HTTP stack.</text>

  <rect x="72" y="468" width="420" height="52" rx="14" fill="#352f2b" fill-opacity="0.75" stroke="#ede8d8" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="96" cy="494" r="5" fill="#9d6f52" fill-opacity="0.8"/>
  <circle cx="114" cy="494" r="5" fill="#c9bea8" fill-opacity="0.35"/>
  <circle cx="132" cy="494" r="5" fill="#c9bea8" fill-opacity="0.2"/>
  <text x="152" y="500" font-family="'DejaVu Sans Mono', monospace" font-size="17" fill="#ede8d8">cargo install satay-cli</text>

  <g transform="translate(780, 155) rotate(-3)" filter="url(#logoShadow)">
    <ellipse cx="170" cy="170" rx="200" ry="200" fill="#9d6f52" fill-opacity="0.18"/>
    <image href="logo.webp" x="40" y="40" width="260" height="260"/>
  </g>

  <line x1="72" y1="580" x2="1128" y2="580" stroke="#ede8d8" stroke-opacity="0.08" stroke-width="1"/>
  <text x="72" y="608" font-family="'DejaVu Sans Mono', monospace" font-size="14" letter-spacing="1.5" fill="#c9bea8" fill-opacity="0.5">SATAY-RS · APACHE-2.0 / MIT</text>
</svg>
