openapi: 3.0.3
info:
  title: Constrained API
  version: 1.0.0
paths:
  /users/{userId}:
    get:
      operationId: getUser
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 20
            pattern: '^[a-zA-Z0-9-]+$'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
        - name: tags
          in: query
          required: false
          schema:
            type: array
            minItems: 1
            maxItems: 3
            items:
              type: string
              minLength: 2
      responses:
        '200':
          description: Found user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
components:
  schemas:
    Age:
      type: integer
      format: int32
      minimum: 0
      maximum: 130
    Email:
      type: string
      pattern: '^[^@]+@[^@]+\.[^@]+$'
    Slug:
      type: string
      pattern: '^[a-z0-9-]+$'
    User:
      type: object
      required:
        - id
        - name
        - age
        - score
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
          maxLength: 80
        age:
          $ref: '#/components/schemas/Age'
        email:
          $ref: '#/components/schemas/Email'
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
