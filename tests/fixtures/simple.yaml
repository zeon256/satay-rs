openapi: 3.1.0
info:
  title: Simple Users API
  version: 1.0.0
paths:
  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getUser
      parameters:
        - name: includeDetails
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Found user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Missing user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
    put:
      operationId: updateUser
      parameters:
        - name: notify
          in: query
          required: false
          schema:
            type: boolean
      requestBody:
        required: false
        content:
          application/vnd.satay.user+json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
components:
  schemas:
    UserStatus:
      type: string
      enum:
        - active
        - suspended
    User:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
        name:
          type: string
        age:
          type: integer
          format: int32
        status:
          $ref: '#/components/schemas/UserStatus'
        tags:
          type: array
          items:
            type: string
    UpdateUserRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        age:
          type: integer
          format: int32
    ErrorBody:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        code:
          type: string
