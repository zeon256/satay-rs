openapi: 3.1.0
info:
  title: Test API
  version: 1.0.0
paths:
  /search:
    get:
      operationId: search
      responses:
        '200':
          description: Search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Search'
components:
  schemas:
    Search:
      type: object
      required:
        - code
        - state
        - window
      properties:
        code:
          type: string
          minLength: 2
          maxLength: 8
        state:
          type: string
          enum:
            - open
            - closed
        window:
          type: string
          minimum: 1
          maximum: 60
          x-satay:
            parse-as: integer-range
