name: Quality Checks

on:
  pull_request:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/build.rs"
      - "examples/**/*.yaml"
      - "tests/**"
      - ".github/actions/setup-rust/**"
      - ".github/workflows/qc.yml"

permissions:
  contents: read

env:
  # sccache cannot cache incremental compilation artifacts
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt
      - name: Format Check
        env:
          RUSTC_WRAPPER: ""
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic -D clippy::perf

  check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Compile Check
        run: cargo check --workspace --all-targets --all-features

  dylint:
    name: Dylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-directories: |
            ~/.dylint_drivers
            target/dylint
      # Prebuilt cargo-dylint release binaries cannot build the dylint driver
      # (they bake in a path dependency that only exists on dylint's own CI),
      # so this must compile from source. It runs after the cache restore:
      # warm runs find the binaries in ~/.cargo/bin and skip the build.
      - name: Install cargo-dylint and dylint-link
        run: cargo install --locked cargo-dylint dylint-link
      - name: Install Dylint toolchain components
        run: |
          set -euo pipefail

          cargo dylint list | while read -r _ toolchain _; do
            if [ -n "${toolchain:-}" ]; then
              rustup component add --toolchain "$toolchain" rustfmt
            fi
          done
      - name: Dylint
        run: cargo dylint --all

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Test
        run: cargo test
