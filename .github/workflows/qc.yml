name: Quality Checks

on:
  pull_request:
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "**/build.rs"
      - "tests/**"
      - ".github/actions/setup-rust/**"

permissions:
  contents: read

env:
  # sccache cannot cache incremental compilation artifacts
  CARGO_INCREMENTAL: "0"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt
      - name: Format Check
        env:
          RUSTC_WRAPPER: ""
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Clippy
        run: cargo clippy -- -D warnings

  dylint:
    name: Dylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@30b5ca8b54e1dcffd9548bc87ede1531310fdc67 # v1.20.0
      - name: Install cargo-dylint and dylint-link
        run: cargo binstall --no-confirm cargo-dylint dylint-link
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          dylint-components: rustfmt
          cache-directories: |
            ~/.dylint_drivers
            target/dylint
      - name: Dylint
        run: cargo dylint --all

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
      - name: Test
        run: cargo test
