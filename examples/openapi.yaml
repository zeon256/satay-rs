openapi: 3.1.0

info:
  title: LTA DataMall Bus API
  version: "3.0"
  description: >
    OpenAPI schema for LTA DataMall bus APIs.
    Returns real-time bus arrival information, bus service details, and bus route details.

servers:
  - url: https://datamall2.mytransport.sg/ltaodataservice

paths:
  /v3/BusArrival:
    get:
      operationId: getBusArrival
      summary: Get bus arrival timings for a bus stop
      description: >
        Returns real-time Bus Arrival information for bus services at a queried
        bus stop, including estimated arrival time, estimated current location,
        and estimated bus load.

        The dataset is updated approximately every 20 seconds.

        According to LTA's documentation, when buses are not in service, or
        when the API service is temporarily unavailable, there may be no response
        returned, not even attribute tags.
      security:
        - accountKeyAuth: []
      parameters:
        - name: BusStopCode
          in: query
          required: true
          description: Bus stop reference code.
          schema:
            $ref: "#/components/schemas/BusStopCode"
          example: "83139"

        - name: ServiceNo
          in: query
          required: false
          description: Optional bus service number filter.
          schema:
            $ref: "#/components/schemas/BusServiceNumber"
          example: "15"

        - name: accept
          in: header
          required: false
          description: Optional response format header. JSON is the default.
          schema:
            type: string
            enum:
              - application/json
              - application/atom+xml
            default: application/json

      responses:
        "200":
          description: >
            Successful Bus Arrival response. In periods where no bus arrival
            data is available, LTA documentation indicates the API may return
            no response body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusArrivalResponse"
              example:
                odata.metadata: "https://datamall2.mytransport.sg/ltaodataservice/v3/BusArrival"
                BusStopCode: "83139"
                Services:
                  - ServiceNo: "15"
                    Operator: "GAS"
                    NextBus:
                      OriginCode: "77009"
                      DestinationCode: "77009"
                      EstimatedArrival: "2024-08-14T16:41:48+08:00"
                      Latitude: "1.3154918333333334"
                      Longitude: "103.9059125"
                      VisitNumber: "1"
                      Load: "SEA"
                      Feature: "WAB"
                      Type: "SD"
                      Monitored: "1"
                    NextBus2:
                      OriginCode: "77009"
                      DestinationCode: "77009"
                      EstimatedArrival: "2024-08-14T16:49:22+08:00"
                      Latitude: "1.3309621666666667"
                      Longitude: "103.9034135"
                      VisitNumber: "1"
                      Load: "SEA"
                      Feature: "WAB"
                      Type: "SD"
                      Monitored: "1"
                    NextBus3:
                      OriginCode: "77009"
                      DestinationCode: "77009"
                      EstimatedArrival: "2024-08-14T17:06:11+08:00"
                      Latitude: "1.344761"
                      Longitude: "103.94022316666667"
                      VisitNumber: "1"
                      Load: "SEA"
                      Feature: "WAB"
                      Type: "SD"
                      Monitored: "1"

  /BusServices:
    get:
      operationId: getBusServices
      summary: Get bus service details
      description: >
        Returns detailed service information for all buses currently in operation,
        including first stop, last stop, and peak / off-peak dispatch frequency.

        The dataset is updated ad hoc.
      security:
        - accountKeyAuth: []
      parameters:
        - name: ServiceNo
          in: query
          required: false
          description: Optional bus service number filter.
          schema:
            $ref: "#/components/schemas/BusServiceNumber"
          example: "107M"

        - name: $skip
          in: query
          required: false
          description: Number of records to skip for pagination.
          schema:
            type: integer
            minimum: 0
          example: 500

        - name: accept
          in: header
          required: false
          description: Optional response format header. JSON is the default.
          schema:
            type: string
            enum:
              - application/json
              - application/atom+xml
            default: application/json

      responses:
        "200":
          description: Successful Bus Services response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusServicesResponse"
              example:
                odata.metadata: "https://datamall2.mytransport.sg/ltaodataservice/$metadata#BusServices"
                value:
                  - ServiceNo: "107M"
                    Operator: "SBST"
                    Direction: 1
                    Category: "TRUNK"
                    OriginCode: "64009"
                    DestinationCode: "64009"
                    AM_Peak_Freq: "14-17"
                    AM_Offpeak_Freq: "10-16"
                    PM_Peak_Freq: "12-15"
                    PM_Offpeak_Freq: "12-15"
                    LoopDesc: "Raffles Blvd"

  /BusRoutes:
    get:
      operationId: getBusRoutes
      summary: Get bus route details
      description: >
        Returns detailed route information for all bus services currently in operation,
        including all bus stops along each route and first / last bus timings for
        each stop.

        The dataset is updated ad hoc.
      security:
        - accountKeyAuth: []
      parameters:
        - name: $skip
          in: query
          required: false
          description: Number of records to skip for pagination.
          schema:
            type: integer
            minimum: 0
          example: 500

        - name: accept
          in: header
          required: false
          description: Optional response format header. JSON is the default.
          schema:
            type: string
            enum:
              - application/json
              - application/atom+xml
            default: application/json

      responses:
        "200":
          description: Successful Bus Routes response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusRoutesResponse"
              example:
                odata.metadata: "https://datamall2.mytransport.sg/ltaodataservice/$metadata#BusRoutes"
                value:
                  - ServiceNo: "107M"
                    Operator: "SBST"
                    Direction: 1
                    StopSequence: 28
                    BusStopCode: "01219"
                    Distance: 10.3
                    WD_FirstBus: "2025"
                    WD_LastBus: "2352"
                    SAT_FirstBus: "1427"
                    SAT_LastBus: "2349"
                    SUN_FirstBus: "0620"
                    SUN_LastBus: "2349"

components:
  securitySchemes:
    accountKeyAuth:
      type: apiKey
      in: header
      name: AccountKey
      description: LTA DataMall API account key.

  schemas:
    BusServicesResponse:
      type: object
      additionalProperties: false
      required:
        - odata.metadata
        - value
      properties:
        odata.metadata:
          type: string
          format: uri
          description: OData metadata URL.
          example: "https://datamall2.mytransport.sg/ltaodataservice/$metadata#BusServices"

        value:
          type: array
          description: Bus service details.
          items:
            $ref: "#/components/schemas/BusService"

    BusService:
      type: object
      additionalProperties: false
      required:
        - ServiceNo
        - Operator
        - Direction
        - Category
        - OriginCode
        - DestinationCode
        - AM_Peak_Freq
        - AM_Offpeak_Freq
        - PM_Peak_Freq
        - PM_Offpeak_Freq
        - LoopDesc
      properties:
        ServiceNo:
          $ref: "#/components/schemas/BusServiceNumber"

        Operator:
          $ref: "#/components/schemas/BusOperator"

        Direction:
          type: integer
          format: int32
          description: >
            The direction in which the bus travels. Valid values are 1 or 2;
            loop services only have 1 direction.
          example: 1
          minimum: 1
          maximum: 2

        Category:
          type: string
          description: >
            Category of the SBS bus service: EXPRESS, FEEDER, INDUSTRIAL,
            TOWNLINK, TRUNK, 2 TIER FLAT FEE, FLAT FEE $1.10, FLAT FEE $1.90,
            FLAT FEE $3.50, or FLAT FEE $3.80.
          example: "TRUNK"
          enum:
            - EXPRESS
            - FEEDER
            - INDUSTRIAL
            - TOWNLINK
            - TRUNK
            - "2-TIER FLAT FEE"
            - "FLATFEE"
            - "NIGHT SERVICE"
            - "CITY_LINK"
            - "FLAT FARE $2.00"
          x-satay:
            enum-variants:
              "2-TIER FLAT FEE": TwoTierFlatFee
              "FLATFEE": FlatFee
              "NIGHT SERVICE": NightService
              "CITY_LINK": CityLink
              "FLAT FARE $2.00": FlatFareTwoDollar

        OriginCode:
          $ref: "#/components/schemas/BusStopCode"
          description: Starting bus stop code for this bus service.

        DestinationCode:
          $ref: "#/components/schemas/BusStopCode"
          description: Ending bus stop code for this bus service.

        AM_Peak_Freq:
          type: string
          description: >
            Frequency of dispatch for AM Peak 0630H - 0830H, as a range in minutes.
            The live API has returned outliers such as "115-115", "75-75", and
            "18-62", so this schema accepts values beyond ordinary short
            dispatch intervals.
          minimum: 1
          maximum: 600
          example: "14-17"
          x-satay:
            parse-as: integer-range

        AM_Offpeak_Freq:
          type: string
          description: >
            Frequency of dispatch for AM Off-Peak 0831H - 1659H, as a range in minutes.
            The live API has returned outliers such as "10-528", so this schema
            accepts values beyond ordinary short dispatch intervals.
          minimum: 1
          maximum: 600
          example: "10-16"
          x-satay:
            parse-as: integer-range

        PM_Peak_Freq:
          type: string
          description: >
            Frequency of dispatch for PM Peak 1700H - 1900H, as a range in minutes.
            The live API has returned outliers such as "08-131", "80-80", and
            "68-68", so this schema accepts values beyond ordinary short
            dispatch intervals.
          minimum: 1
          maximum: 600
          example: "12-15"
          x-satay:
            parse-as: integer-range

        PM_Offpeak_Freq:
          type: string
          description: >
            Frequency of dispatch for PM Off-Peak after 1900H, as a range in minutes.
            The live API has returned outliers such as "81-81" and "09-80", so
            this schema accepts values beyond ordinary short dispatch intervals.
          minimum: 1
          maximum: 600
          example: "12-15"
          x-satay:
            parse-as: integer-range

        LoopDesc:
          type: string
          description: Location at which the bus service loops, empty if not a loop service.
          example: "Raffles Blvd"

    BusRoutesResponse:
      type: object
      additionalProperties: false
      required:
        - odata.metadata
        - value
      properties:
        odata.metadata:
          type: string
          format: uri
          description: OData metadata URL.
          example: "https://datamall2.mytransport.sg/ltaodataservice/$metadata#BusRoutes"

        value:
          type: array
          description: Bus route details.
          items:
            $ref: "#/components/schemas/BusRoute"

    BusRoute:
      type: object
      additionalProperties: false
      required:
        - ServiceNo
        - Operator
        - Direction
        - StopSequence
        - BusStopCode
        - Distance
        - WD_FirstBus
        - WD_LastBus
        - SAT_FirstBus
        - SAT_LastBus
        - SUN_FirstBus
        - SUN_LastBus
      properties:
        ServiceNo:
          $ref: "#/components/schemas/BusServiceNumber"

        Operator:
          $ref: "#/components/schemas/BusOperator"

        Direction:
          type: integer
          format: int32
          description: >
            The direction in which the bus travels. Valid values are 1 or 2;
            loop services only have 1 direction.
          example: 1
          minimum: 1
          maximum: 2

        StopSequence:
          type: integer
          format: int32
          description: The i-th bus stop for this route.
          example: 28
          minimum: 1

        BusStopCode:
          $ref: "#/components/schemas/BusStopCode"

        Distance:
          type: number
          format: double
          description: Distance travelled by bus from starting location to this bus stop, in kilometres.
          example: 10.3
          minimum: 0

        WD_FirstBus:
          type: [string, "null"]
          description: Scheduled arrival of first bus on weekdays.
          example: "2025"
          x-satay:
            parse-as: time

        WD_LastBus:
          type: [string, "null"]
          description: Scheduled arrival of last bus on weekdays.
          example: "2352"
          x-satay:
            parse-as: time

        SAT_FirstBus:
          type: [string, "null"]
          description: Scheduled arrival of first bus on Saturdays.
          example: "1427"
          x-satay:
            parse-as: time

        SAT_LastBus:
          type: [string, "null"]
          description: Scheduled arrival of last bus on Saturdays.
          example: "2349"
          x-satay:
            parse-as: time

        SUN_FirstBus:
          type: [string, "null"]
          description: Scheduled arrival of first bus on Sundays.
          example: "0620"
          x-satay:
            parse-as: time

        SUN_LastBus:
          type: [string, "null"]
          description: Scheduled arrival of last bus on Sundays.
          example: "2349"
          x-satay:
            parse-as: time

    BusArrivalResponse:
      type: object
      additionalProperties: false
      required:
        - odata.metadata
        - BusStopCode
        - Services
      properties:
        odata.metadata:
          type: string
          format: uri
          description: OData metadata URL.
          example: "https://datamall2.mytransport.sg/ltaodataservice/v3/BusArrival"

        BusStopCode:
          $ref: "#/components/schemas/BusStopCode"

        Services:
          type: array
          description: Bus services serving the queried bus stop.
          items:
            $ref: "#/components/schemas/BusServiceArrival"

    BusServiceArrival:
      type: object
      additionalProperties: false
      required:
        - ServiceNo
        - Operator
        - NextBus
        - NextBus2
        - NextBus3
      properties:
        ServiceNo:
          $ref: "#/components/schemas/BusServiceNumber"

        Operator:
          $ref: "#/components/schemas/BusOperator"

        NextBus:
          $ref: "#/components/schemas/BusArrivalTiming"
          x-satay:
            treat-error-as-none: true

        NextBus2:
          $ref: "#/components/schemas/BusArrivalTiming"
          x-satay:
            treat-error-as-none: true

        NextBus3:
          $ref: "#/components/schemas/BusArrivalTiming"
          x-satay:
            treat-error-as-none: true

    BusOperator:
      type: string
      description: Public transport operator code.
      enum:
        - SBST
        - SMRT
        - TTS
        - GAS
      example: "SBST"

    BusServiceNumber:
      type: string
      description: The bus service number.
      maxLength: 5
      pattern: "^[a-zA-Z0-9]+$"
      example: "107M"

    BusStopCode:
      type: string
      description: Unique 5-digit bus stop reference code.
      pattern: '^\d{5}$'
      example: "83139"
      x-satay:
        parse-as: u32

    BusArrivalTiming:
      type: object
      additionalProperties: false
      required:
        - OriginCode
        - DestinationCode
        - EstimatedArrival
        - Latitude
        - Longitude
        - VisitNumber
        - Load
        - Feature
        - Type
        - Monitored
      properties:
        OriginCode:
          $ref: "#/components/schemas/BusStopCode"

        DestinationCode:
          $ref: "#/components/schemas/BusStopCode"

        EstimatedArrival:
          type: string
          description: >
            Estimated arrival date-time in Singapore Standard Time, represented
            as an ISO 8601 timestamp with +08:00 offset.
          example: "2024-08-14T16:41:48+08:00"
          x-satay:
            parse-as: offset-datetime

        Latitude:
          type: string
          description: >
            Current estimated latitude of the bus at the point of published data.
            May be "0.0" for schedule-based values.
          example: "1.3154918333333334"
          x-satay:
            parse-as: f64

        Longitude:
          type: string
          description: >
            Current estimated longitude of the bus at the point of published data.
            May be "0.0" for schedule-based values.
          example: "103.9059125"
          x-satay:
            parse-as: f64

        VisitNumber:
          type: string
          description: >
            Ordinal visit number of this vehicle at the bus stop.
            1 = first visit, 2 = second visit etc
          example: "1"
          x-satay:
            parse-as: u8

        Load:
          type: string
          description: >
            Current occupancy / crowding level.
          enum:
            - SEA
            - SDA
            - LSD
            - ""
          example: SEA
          x-satay:
            enum-variants:
              SEA: SeatsAvailable
              SDA: StandingAvailable
              LSD: LimitedStanding
              "": Unknown

        Feature:
          type: string
          description: >
            Wheelchair accessibility indicator. Possibly can be extended in the future
          enum:
            - WAB
            - ""
          example: WAB
          x-satay:
            enum-variants:
              WAB: WheelchairAccessible
              "": Unknown

        Type:
          type: string
          description: >
            Vehicle type of the bus.
          enum:
            - SD
            - DD
            - BD
            - ""
          example: SD
          x-satay:
            enum-variants:
              SD: SingleDecker
              DD: DoubleDecker
              BD: Bendy
              "": Unknown

        Monitored:
          type: integer
          description: >
            Indicator of whether the bus is currently being monitored by the system.
          enum:
            - 1
            - 0
          example: 1
          x-satay:
            parse-as: bool
